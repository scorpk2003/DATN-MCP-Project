services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_AGENT_GATEWAY_URL: ${VITE_AGENT_GATEWAY_URL:-/api/agent-gateway}
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - datn-network
    depends_on:
      - agent-gateway

  agent-gateway:
    build:
      context: .
      dockerfile: docker/agent-gateway.Dockerfile
    env_file:
      - .env
    environment:
      AGENT_GATEWAY_HOST: 0.0.0.0
      AGENT_GATEWAY_PORT: ${AGENT_GATEWAY_PORT:-4000}
      ORCHESTRATOR_BASE_URL: http://orchestrator:${ORCHESTRATOR_PORT:-3000}
      DATABASE_MCP_BASE_URL: http://database-mcp:${SERVER_DATABASE_PORT:-3101}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "${AGENT_GATEWAY_HOST_PORT:-4000}:${AGENT_GATEWAY_PORT:-4000}"
    networks:
      - datn-network
    depends_on:
      - orchestrator

  orchestrator:
    build:
      context: .
      dockerfile: docker/orchestrator.Dockerfile
    env_file:
      - .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ORCHESTRATOR_HOST: 0.0.0.0
      ORCHESTRATOR_PORT: ${ORCHESTRATOR_PORT:-3000}
      ORCHESTRATOR_MCP_SERVERS: ${ORCHESTRATOR_MCP_SERVERS:-database,resource,roadmap,lesson}
      ORCHESTRATOR_OPTIONAL_MCP_SERVERS: ${ORCHESTRATOR_OPTIONAL_MCP_SERVERS:-}
      MCP_CONNECT_TIMEOUT_MS: ${MCP_CONNECT_TIMEOUT_MS:-3000}
      MCP_LIST_TOOLS_TIMEOUT_MS: ${MCP_LIST_TOOLS_TIMEOUT_MS:-3000}
      MCP_CALL_TOOL_TIMEOUT_MS: ${MCP_CALL_TOOL_TIMEOUT_MS:-15000}
      MCP_CALL_RETRIES: ${MCP_CALL_RETRIES:-1}
      MCP_RETRY_BACKOFF_MS: ${MCP_RETRY_BACKOFF_MS:-150}
      AGENT_MODEL: ${AGENT_MODEL:-openai/gpt-oss-120b:free}
      AGENT_MAX_STEPS: ${AGENT_MAX_STEPS:-8}
      AGENT_MAX_REPLANS: ${AGENT_MAX_REPLANS:-2}
      AGENT_MAX_PARAM_REPAIRS: ${AGENT_MAX_PARAM_REPAIRS:-1}
      SERVER_DATABASE_HOST: database-mcp
      SERVER_DATABASE_PORT: ${SERVER_DATABASE_PORT:-3101}
      SERVER_ROADMAP_HOST: roadmap-mcp
      SERVER_ROADMAP_PORT: ${SERVER_ROADMAP_PORT:-3102}
      SERVER_LESSON_HOST: lesson-mcp
      SERVER_LESSON_PORT: ${SERVER_LESSON_PORT:-3400}
      SERVER_RESOURCE_HOST: resource-mcp
      SERVER_RESOURCE_PORT: ${SERVER_RESOURCE_MCP_PORT:-3300}
    ports:
      - "${ORCHESTRATOR_HOST_PORT:-3000}:${ORCHESTRATOR_PORT:-3000}"
    networks:
      - datn-network
    depends_on:
      - database-mcp
      - roadmap-mcp
      - lesson-mcp
      - resource-mcp

  database-mcp:
    build:
      context: .
      dockerfile: docker/mcp-server.Dockerfile
      args:
        PACKAGE: database_sv
    env_file:
      - .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-localhost,127.0.0.1,::1,database-mcp,roadmap-mcp,resource-mcp,lesson-mcp}
      SERVER_DATABASE_HOST: 0.0.0.0
      SERVER_DATABASE_PORT: ${SERVER_DATABASE_PORT:-3101}
      DB_HOST: ${DB_HOST:-app-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-datn}
      DB_USER: ${DB_USER:-datn}
      DB_PASS: ${DB_PASS:-datn}
      DB_SSL_MODE: ${DB_SSL_MODE:-require}
    ports:
      - "${SERVER_DATABASE_HOST_PORT:-3101}:${SERVER_DATABASE_PORT:-3101}"
    networks:
      - datn-network

  app-postgres:
    image: postgres:16-alpine
    profiles:
      - local-db
    environment:
      POSTGRES_DB: ${APP_DB_NAME:-datn}
      POSTGRES_USER: ${APP_DB_USER:-datn}
      POSTGRES_PASSWORD: ${APP_DB_PASS:-datn}
    ports:
      - "${APP_POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - app-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - datn-network

  roadmap-mcp:
    build:
      context: .
      dockerfile: docker/mcp-server.Dockerfile
      args:
        PACKAGE: roadmap_sv
    env_file:
      - .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-localhost,127.0.0.1,::1,database-mcp,roadmap-mcp,resource-mcp,lesson-mcp}
      ROADMAP_MCP_HOST: 0.0.0.0
      ROADMAP_MCP_PORT: ${ROADMAP_MCP_PORT:-3102}
      RESOURCE_MCP_URL: http://resource-mcp:${SERVER_RESOURCE_MCP_PORT:-3300}/mcp
      RESOURCE_SERVICE_URL: http://resource-api:${RESOURCE_SERVICE_API_PORT:-3200}
      RESOURCE_SERVICE_BASE_URL: http://resource-api:${RESOURCE_SERVICE_API_PORT:-3200}
    ports:
      - "${ROADMAP_MCP_HOST_PORT:-3102}:${ROADMAP_MCP_PORT:-3102}"
    networks:
      - datn-network

  lesson-mcp:
    build:
      context: .
      dockerfile: docker/mcp-server.Dockerfile
      args:
        PACKAGE: lesson_sv
    env_file:
      - .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-localhost,127.0.0.1,::1,database-mcp,roadmap-mcp,resource-mcp,lesson-mcp}
      LESSON_MCP_HOST: 0.0.0.0
      LESSON_MCP_PORT: ${LESSON_MCP_PORT:-3400}
      RESOURCE_MCP_URL: http://resource-mcp:${SERVER_RESOURCE_MCP_PORT:-3300}/mcp
      DATABASE_MCP_URL: http://database-mcp:${SERVER_DATABASE_PORT:-3101}/mcp
    ports:
      - "${LESSON_MCP_HOST_PORT:-3400}:${LESSON_MCP_PORT:-3400}"
    networks:
      - datn-network
    depends_on:
      - database-mcp
      - resource-mcp

  resource-mcp:
    build:
      context: .
      dockerfile: docker/mcp-server.Dockerfile
      args:
        PACKAGE: resource_sv
    env_file:
      - .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-localhost,127.0.0.1,::1,database-mcp,roadmap-mcp,resource-mcp,lesson-mcp}
      SERVER_RESOURCE_MCP_HOST: 0.0.0.0
      SERVER_RESOURCE_MCP_PORT: ${SERVER_RESOURCE_MCP_PORT:-3300}
      RESOURCE_SERVICE_BASE_URL: http://resource-api:${RESOURCE_SERVICE_API_PORT:-3200}
    ports:
      - "${SERVER_RESOURCE_MCP_HOST_PORT:-3300}:${SERVER_RESOURCE_MCP_PORT:-3300}"
    networks:
      - datn-network

networks:
  datn-network:
    name: ${DATN_NETWORK_NAME:-datn-network}
    external: true

volumes:
  app-postgres-data:
