sources:
  - id: react_docs
    name: React Docs
    kind: official_docs
    base_url: https://react.dev
    trust_tier: 1
    language_hint: en
    is_official: true
    enabled: true
    allowed_paths: ["/learn", "/reference"]
    blocked_paths: ["/blog", "/community"]
    default_resource_kind: primary_learning
    crawl_policy:
      max_depth_default: 1
      rate_limit_per_minute: 30
      respect_robots_txt: true
      user_agent: self-learn-resource-worker/0.2.1
  - id: mdn_web_docs
